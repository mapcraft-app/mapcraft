stages:
  - build
#  - release

build:
  stage: build
  image: electronuserland/builder:wine
  script:
    - echo "Building stage"
    - echo "${CI_JOB_ID}" > CI_JOB_ID.txt
    - yarn
    - yarn dist
  artifacts:
    paths:
      - CI_JOB_ID.txt
      - ./out/*.zip
      - ./out/*.deb
      - ./out/*.rpm
      - ./out/*.exe
      - ./out/*.blockmap
    expire_in: 30 days

