stages:
  - build
  - release

build:
  stage: build
  image: electronuserland/builder:wine
  script:
    - echo "Building stage"
    - echo "${CI_JOB_ID}" > CI_JOB_ID.txt
    - curl -O https://download.mapcraft.app/srcs/json.bash
    - cat ./src/manifest | bash ./json.bash software | sed 's/ //g' > TAG_VERSION.txt
    - yarn
    - yarn dist
  artifacts:
    paths:
      - CI_JOB_ID.txt
      - TAG_VERSION.txt
      - ./out/*.zip
      - ./out/*.tar.gz
      - ./out/*.dmg
      - ./out/*.AppImage
      - ./out/*.exe
      - ./out/*.blockmap
    expire_in: never
  rules:
    - if: $CI_COMMIT_TAG

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - TAG_VERSION=$(cat TAG_VERSION.txt)
    - CI_ID=$(cat CI_JOB_ID.txt)
    - echo "${CI_ID} ${TAG_VERSION}"
    - rm -f TAG_VERSION.txt CI_JOB_ID.txt
    - |
      release-cli create --name "v$TAG_VERSION" --tag-name $TAG_VERSION --ref $CI_COMMIT_SHA \
      --assets-link "{\"name\":\"Windows setup\",\"url\":\"https://gitlab.com/cbertran/mapcraft/-/jobs/`echo "${CI_ID}"`/artifacts/raw/out/mapcraft_win.exe\"}" \
      --assets-link "{\"name\":\"Windows setup blockmap\",\"url\":\"https://gitlab.com/cbertran/mapcraft/-/jobs/`echo "${CI_ID}"`/artifacts/raw/out/mapcraft_win.exe.blockmap\"}" \
      --assets-link "{\"name\":\"Windows archive\",\"url\":\"https://gitlab.com/cbertran/mapcraft/-/jobs/`echo "${CI_ID}"`/artifacts/raw/out/mapcraft_win.zip\"}" \
      \
      --assets-link "{\"name\":\"Linux AppImage\",\"url\":\"https://gitlab.com/cbertran/mapcraft/-/jobs/`echo "${CI_ID}"`/artifacts/raw/out/mapcraft_linux.AppImage\"}" \
      --assets-link "{\"name\":\"Linux archive\",\"url\":\"https://gitlab.com/cbertran/mapcraft/-/jobs/`echo "${CI_ID}"`/artifacts/raw/out/mapcraft_linux.zip\"}" \
      \
      --assets-link "{\"name\":\"MacOS dmg\",\"url\":\"https://gitlab.com/cbertran/mapcraft/-/jobs/`echo "${CI_ID}"`/artifacts/raw/out/mapcraft_mac.dmg\"}" \
      --assets-link "{\"name\":\"MacOS archive\",\"url\":\"https://gitlab.com/cbertran/mapcraft/-/jobs/`echo "${CI_ID}"`/artifacts/raw/out/mapcraft_mac.tar.gz\"}"
  rules:
    - if: $CI_COMMIT_TAG
