stages:
  - build
#  - release

build:
  stage: build
  image: electronuserland/builder:wine
  script:
    - echo "Building stage"
    - echo "${CI_JOB_ID}" > CI_JOB_ID.txt
    - cp ./src/manifest MANIFEST
    - yarn
    - yarn dist
  artifacts:
    paths:
      - CI_JOB_ID.txt
      - MANIFEST
      - ./out/*.zip
      - ./out/*.deb
      - ./out/*.rpm
      - ./out/*.exe
      - ./out/*.blockmap
    expire_in: 3 days
  rules:
    - if: $CI_COMMIT_TAG

