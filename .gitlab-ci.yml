build:
  stage: build
  image: electronuserland/builder:wine
  script:
    - echo "Building stage"
    - echo "${CI_JOB_ID}" > CI_JOB_ID.txt
    - yarn
    - yarn make-full
  artifacts:
    paths:
      - ./dist/
    expire_in: 30 days

