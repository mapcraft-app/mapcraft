stages:
  - build-mac
  - build-windows
  - build-linux
  - release

build-mac:
  stage: build-mac
  tags:
    - macos-runner
  script:
    - echo "Building stage for MacOS, ID:${CI_JOB_ID}"
    - echo "${CI_JOB_ID}" > CI_JOB_ID_MAC.txt
    - npm install --production=false
    - npm install --save-dev dmg-license
    - npm run distMac
  artifacts:
    paths:
      - CI_JOB_ID_MAC.txt
      - ./out/mapcraft_mac.zip
      - ./out/mapcraft_mac.dmg
    expire_in: never
  rules:
    - if: $CI_COMMIT_TAG

build-windows:
  stage: build-windows
  tags:
    - windows-runner
  script:
    - echo "Building stage for Windows, ID:$CI_JOB_ID"
    - echo $CI_JOB_ID > CI_JOB_ID_WINDOWS.txt
    - npm install --production=false
    - npm run distWindows
  artifacts:
    paths:
      - CI_JOB_ID_WINDOWS.txt
      - ./out/mapcraft_win.zip
      - ./out/mapcraft_win.exe
      - ./out/mapcraft_win.exe.blockmap
    expire_in: never
  rules:
    - if: $CI_COMMIT_TAG

build-linux:
  stage: build-linux
  image: electronuserland/builder:wine
  script:
    - echo "Building stage for Linux, ID:${CI_JOB_ID}"
    - echo "${CI_JOB_ID}" > CI_JOB_ID_LINUX.txt
    - curl -O https://download.mapcraft.app/srcs/json.bash
    - cat ./src/manifest | bash ./json.bash software | sed 's/ //g' > TAG_VERSION.txt
    - npm install --production=false
    - npm run distLinux
  artifacts:
    paths:
      - CI_JOB_ID_LINUX.txt
      - TAG_VERSION.txt
      - ./out/mapcraft_linux.zip
      - ./out/mapcraft_linux.AppImage
    expire_in: never
  rules:
    - if: $CI_COMMIT_TAG

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - TAG_VERSION=$(cat TAG_VERSION.txt)
    - CI_ID_WINDOWS=$(tr -d "\r" < CI_JOB_ID_WINDOWS.txt)
    - CI_ID_LINUX=$(cat CI_JOB_ID_LINUX.txt)
    - CI_ID_MAC=$(cat CI_JOB_ID_MAC.txt)
    - echo "${CI_ID} ${TAG_VERSION}"
    - rm -f TAG_VERSION.txt CI_JOB_ID_LINUX.txt CI_JOB_ID_MAC.txt CI_JOB_ID_WINDOWS.txt
    - |
      release-cli create --name "$TAG_VERSION" --tag-name $TAG_VERSION --ref $CI_COMMIT_SHA \
      --assets-link "{\"name\":\"Windows setup\",\"url\":\"https://gitlab.com/cbertran/mapcraft/-/jobs/`echo "${CI_ID_WINDOWS}"`/artifacts/raw/out/mapcraft_win.exe\"}" \
      --assets-link "{\"name\":\"Windows setup blockmap\",\"url\":\"https://gitlab.com/cbertran/mapcraft/-/jobs/`echo "${CI_ID_WINDOWS}"`/artifacts/raw/out/mapcraft_win.exe.blockmap\"}" \
      --assets-link "{\"name\":\"Windows archive\",\"url\":\"https://gitlab.com/cbertran/mapcraft/-/jobs/`echo "${CI_ID_WINDOWS}"`/artifacts/raw/out/mapcraft_win.zip\"}" \
      \
      --assets-link "{\"name\":\"Linux AppImage\",\"url\":\"https://gitlab.com/cbertran/mapcraft/-/jobs/`echo "${CI_ID_LINUX}"`/artifacts/raw/out/mapcraft_linux.AppImage\"}" \
      --assets-link "{\"name\":\"Linux archive\",\"url\":\"https://gitlab.com/cbertran/mapcraft/-/jobs/`echo "${CI_ID_LINUX}"`/artifacts/raw/out/mapcraft_linux.zip\"}" \
      \
      --assets-link "{\"name\":\"MacOS dmg\",\"url\":\"https://gitlab.com/cbertran/mapcraft/-/jobs/`echo "${CI_ID_MAC}"`/artifacts/raw/out/mapcraft_mac.dmg\"}" \
      --assets-link "{\"name\":\"MacOS archive\",\"url\":\"https://gitlab.com/cbertran/mapcraft/-/jobs/`echo "${CI_ID_MAC}"`/artifacts/raw/out/mapcraft_mac.zip\"}"
  rules:
    - if: $CI_COMMIT_TAG
