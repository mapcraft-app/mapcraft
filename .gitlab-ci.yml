stages:
  - build
  - release

build:
  stage: build
  image: electronuserland/builder:wine
  script:
    - echo "Building stage"
    - echo "${CI_JOB_ID}" > CI_JOB_ID.txt
    - cat ./src/manifest | bash ./json.bash software | sed 's/ //g' > TAG_VERSION.txt
    - cp ./src/manifest MANIFEST.json
    - yarn
    - yarn dist
  artifacts:
    paths:
      - CI_JOB_ID.txt
      - TAG_VERSION.txt
      - MANIFEST.json
      - ./out/*.zip
      - ./out/*.AppImage
      - ./out/*.exe
      - ./out/*.blockmap
    expire_in: never

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - TAG_VERSION=$(cat TAG_VERSION.txt)
    - echo TAG_VERSION
    - |
      release-cli create --name "v$TAG_VERSION" --tag-name $TAG_VERSION --ref $CI_COMMIT_SHA \
      --assets-link "{\"name\":\"Windows setup\",\"url\":\"https://gitlab.com/cbertran/mapcraft/-/jobs/`cat CI_JOB_ID.txt`/artifacts/raw/out/mapcraft_win.exe\"}" \
      --assets-link "{\"name\":\"Windows setup blockmap\",\"url\":\"https://gitlab.com/cbertran/mapcraft/-/jobs/`cat CI_JOB_ID.txt`/artifacts/raw/out/mapcraft_win.exe.blockmap\"}" \
      --assets-link "{\"name\":\"Windows archive\",\"url\":\"https://gitlab.com/cbertran/mapcraft/-/jobs/`cat CI_JOB_ID.txt`/artifacts/raw/out/mapcraft_win.zip\"}" \
      \
      --assets-link "{\"name\":\"Linux AppImage\",\"url\":\"https://gitlab.com/cbertran/mapcraft/-/jobs/`cat CI_JOB_ID.txt`/artifacts/raw/out/mapcraft_linux.AppImage\"}" \
      --assets-link "{\"name\":\"Linux archive\",\"url\":\"https://gitlab.com/cbertran/mapcraft/-/jobs/`cat CI_JOB_ID.txt`/artifacts/raw/out/mapcraft_linux.zip\"}" \
      \
      --assets-link "{\"name\":\"MacOS archive\",\"url\":\"https://gitlab.com/cbertran/mapcraft/-/jobs/`cat CI_JOB_ID.txt`/artifacts/raw/out/mapcraft_mac.zip\"}"
